<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>SubTrack AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Import Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: 'var(--color-background)',
              surface: 'var(--color-surface)',
              primary: 'var(--color-primary)',
              secondary: 'var(--color-secondary)',
              textMain: 'var(--color-text-main)',
              border: 'var(--color-border)',
              success: 'var(--color-success)',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'], // Set Inter as default sans
            },
          },
        },
      }
    </script>
    <style>
      :root {
        /* Professional Blue Theme (Light) */
        --color-primary: #2563eb; /* Royal Blue */
        --color-success: #10b981;
        --color-background: #ffffff;
        --color-surface: #f8fafc; /* Very light slate */
        --color-secondary: #64748b;
        --color-text-main: #0f172a;
        --color-border: #e2e8f0;
      }

      /* Dark Mode Variables */
      .dark {
        --color-primary: #3b82f6; /* Lighter Blue for Dark Mode */
        --color-success: #34d399;
        --color-background: #0f172a;
        --color-surface: #1e293b;
        --color-secondary: #94a3b8;
        --color-text-main: #f8fafc;
        --color-border: #1e293b; /* Darkened from #334155 to match surface/background blend */
      }

      body {
        background-color: var(--color-background);
        color: var(--color-text-main);
        font-family: 'Inter', sans-serif; /* Apply globally */
        -webkit-tap-highlight-color: transparent;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      
      /* Hide scrollbar for cleaner mobile look */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }

      /* Hide number input spinners */
      .no-spinner::-webkit-inner-spin-button, 
      .no-spinner::-webkit-outer-spin-button { 
        -webkit-appearance: none; 
        margin: 0; 
      }
      .no-spinner {
        -moz-appearance: textfield;
      }

      /* Custom animations */
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes scaleIn {
        from { transform: scale(0.95); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      
      .animate-fade-in { animation: fadeIn 0.3s ease-out; }
      .animate-slide-up { animation: slideUp 0.4s ease-out; }
      .animate-scale-in { animation: scaleIn 0.2s ease-out; }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.5.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  </body>
</html>
